name: Test CPG pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            pytest==7.4.3 \
            pyspark==3.5.1 \
            kafka-python==2.0.2

      - name: Compile Python sources
        run: python -m compileall -q src tests scripts run_demo.py

      - name: Run all tests
        run: python -m pytest -q

      - name: Validate Docker Compose
        run: docker compose --profile person3 config --quiet
