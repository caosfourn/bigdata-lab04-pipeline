services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: cpg-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: cpg-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: cpg-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  kafka-connect:
    build:
      context: .
      dockerfile: docker/kafka-connect.Dockerfile
    container_name: cpg-kafka-connect
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: cpg-connect
      CONNECT_CONFIG_STORAGE_TOPIC: _cpg_connect_configs
      CONNECT_OFFSET_STORAGE_TOPIC: _cpg_connect_offsets
      CONNECT_STATUS_STORAGE_TOPIC: _cpg_connect_status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
    depends_on:
      kafka:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  neo4j:
    image: neo4j:5.20-community
    container_name: cpg-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/cpg-password}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  mongodb:
    image: mongo:7.0.12
    container_name: cpg-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 12

  spark-person3:
    image: apache/spark:3.5.1-scala2.12-java17-python3-ubuntu
    container_name: cpg-spark-person3
    profiles: ["person3"]
    user: "0:0"
    working_dir: /opt/project
    environment:
      PYSPARK_PYTHON: python3
      PYSPARK_DRIVER_PYTHON: python3
    volumes:
      - .:/opt/project:ro
      - ./runtime/spark-ivy:/opt/ivy
      - ./checkpoints:/opt/checkpoints
    entrypoint: ["/opt/spark/bin/spark-submit"]
    command:
      - --master
      - local[1]
      - --conf
      - spark.jars.ivy=/opt/ivy
      - --packages
      - org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1,org.mongodb.spark:mongo-spark-connector_2.12:10.7.0
      - /opt/project/src/metadata_streaming_job.py
      - --brokers
      - kafka:29092
      - --topic
      - cpg.metadata
      - --mongo-uri
      - mongodb://mongodb:27017
      - --mongo-db
      - cpg
      - --mongo-collection
      - metadata_person3
      - --checkpoint-location
      - /opt/checkpoints/person3-final-docker
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy

volumes:
  neo4j_data:
  mongo_data:
